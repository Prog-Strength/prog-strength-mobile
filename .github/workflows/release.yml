name: Mobile Release

# Fully automatic releases — one decision the pipeline makes itself:
#
#   Every push to main runs continuous-deploy-fingerprint, which
#   computes the native fingerprint (a hash of everything that affects
#   the native binary: native deps, config plugins, SDK version) and:
#
#     - fingerprint already has an EAS build  → JS-only change →
#       `eas update` to the production branch; phones pick it up on
#       next app launch (~30s).
#     - fingerprint has NO build              → native change →
#       `eas build --auto-submit` → new TestFlight build, no human
#       in the loop. The build embeds the current JS bundle.
#
#   runtimeVersion.policy is "fingerprint" (app.json), so an OTA
#   update can never land on a binary whose native state doesn't
#   match — the version-bump foot-gun from the appVersion era is
#   structurally gone. No more manual version bumps for native
#   changes; `autoIncrement` still handles the build number.
#
#   workflow_dispatch with build=true remains as an escape hatch to
#   FORCE a native build when the fingerprint hasn't changed — needed
#   for TestFlight's 90-day build expiry, and nothing else.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build:
        description: "Force a native build even though the fingerprint hasn't changed (e.g. TestFlight 90-day expiry refresh)"
        type: boolean
        default: false
      profile:
        description: "EAS build profile for the forced build"
        type: choice
        options:
          - preview
          - production
        default: production

concurrency:
  group: mobile-release
  cancel-in-progress: false

jobs:
  deploy:
    # The automatic path: every push to main. Decides OTA vs native
    # build by fingerprint; auto-submits new builds to TestFlight.
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: expo/expo-github-action@v9
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Continuous deploy (fingerprint)
        uses: expo/expo-github-action/continuous-deploy-fingerprint@v9
        with:
          profile: production
          branch: production
          platform: ios
          auto-submit-builds: true

  forced-build:
    # Escape hatch: manual dispatch with build=true. Identical to the
    # old manual native path; exists only for fingerprint-unchanged
    # rebuilds (TestFlight 90-day expiry).
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.build == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: expo/expo-github-action@v9
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS build
        run: |
          eas build \
            --platform ios \
            --profile ${{ github.event.inputs.profile }} \
            --non-interactive

      - name: Submit to App Store Connect
        if: ${{ github.event.inputs.profile == 'production' }}
        run: |
          eas submit \
            --platform ios \
            --profile production \
            --latest \
            --non-interactive
